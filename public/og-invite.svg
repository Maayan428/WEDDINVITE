<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f0fafa"/>

  <!-- Decorative border -->
  <rect x="20" y="20" width="1160" height="590" fill="none"
        stroke="#0d9488" stroke-width="2" rx="16"/>
  <rect x="30" y="30" width="1140" height="570" fill="none"
        stroke="#0d9488" stroke-width="0.5" rx="12"/>

  <!-- Small label -->
  <text x="600" y="200" text-anchor="middle"
        font-family="serif" font-size="28" fill="#0d9488" letter-spacing="8">
    הוזמנת לחתונה
  </text>

  <!-- Decorative line -->
  <line x1="450" y1="225" x2="750" y2="225" stroke="#0d9488" stroke-width="1"/>

  <!-- Ring emoji -->
  <text x="600" y="320" text-anchor="middle"
        font-family="serif" font-size="72" font-weight="bold" fill="#1e3a5f">
    💍
  </text>

  <!-- Subtitle -->
  <text x="600" y="400" text-anchor="middle"
        font-family="serif" font-size="36" fill="#1e3a5f">
    לחצו לאישור הגעה
  </text>

  <!-- Bottom decoration -->
  <line x1="400" y1="440" x2="800" y2="440" stroke="#0d9488" stroke-width="0.5"/>
  <text x="600" y="480" text-anchor="middle"
        font-family="sans-serif" font-size="22" fill="#6b7280">
    weddinvite-ten.vercel.app
  </text>
</svg>
